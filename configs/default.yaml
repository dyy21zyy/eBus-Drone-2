project: ebus_drone_rl
instance: medium
method: proposed
seed: 1
paths:
  data_generated: data/generated
  outputs: outputs
offline:
  allow_greedy_fallback: false
generation:
  bus_operation_horizon_minutes: 360
  delivery_evaluation_horizon_minutes: 480
  horizon_minutes: 480
  num_scenarios: 1
  allow_infeasible_deadlines: false
  max_customer_generation_retries: 100
network:
  num_stops: 30
  stop_spacing_km: 1.0
  interstop_distance_km: 1.0
  service_area:
    x_min_km: 0.0
    x_max_km: 30.0
    y_min_km: -6.0
    y_max_km: 6.0
bus:
  passenger_capacity: 80
  battery_capacity_kwh: 160.0
  safety_battery_kwh: 40.0
  energy_kwh_per_km: 1.6
  nominal_speed_kmh: 30.0
  freight_capacity_kg: 20.0
  initial_battery_fraction_min: 0.55
  initial_battery_fraction_max: 0.85
charging:
  chargers_per_station: 2
  pantograph_power_kw: 500.0
  efficiency: 0.95
  action_set_seconds: [0, 15, 30, 45, 60, 75, 90, 105, 120]
  max_single_stop_seconds: 120
passenger:
  arrival_process: time_dependent_poisson
  baseline_rate_mean_per_min: 0.25
  baseline_rate_std_per_min: 0.10
  baseline_rate_min_per_min: 0.05
  baseline_rate_max_per_min: 0.60
  demand_intensity_factor: 1.0
  demand_intensity_sensitivity: [0.75, 1.0, 1.25, 1.5]
  boarding_time_sec_per_passenger: 3.0
  alighting_time_sec_per_passenger: 1.5
  alighting_probability_min: 0.05
  alighting_probability_max: 0.25
parcel:
  weight_values_kg: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5]
  drone_service_radius_km: 8.0
  drone_round_trip_range_km: 8.0
  unloading_capacity_kg_per_stop: 10.0
  unloading_time_sec_per_kg: 6.0
  locker_capacity_kg: 30.0
  nominal_locker_waiting_time_min: 10.0
  cost:
    bus_transport_per_kgkm: 1.0
    drone_per_km: 2.0
    locker_holding_per_kgmin: 0.1
    lateness_per_min: 10.0
drone:
  drones_per_station: 3
  speed_kmh: 40.0
  max_round_trip_duration_min: 120.0
  customer_service_time_min: 1.0
  turnaround_time_min: 1.0
battery:
  initial_fully_charged_per_station: 6
  initial_depleted_per_station: 0
  charge_power_kw: 2.0
  charge_duration_min: 45.0
  max_simultaneous_charging: 6
  charging_mode: non_preemptive
power:
  station_capacity_kw: 1100.0
  nominal_base_load_min_kw: 80.0
  nominal_base_load_max_kw: 180.0
  disturbance_std_kw: 8.0
reward:
  alpha_1: 1.0
  alpha_2: 1.0
  alpha_3: 0.2
  alpha_4: 1.0
  alpha_5: 5.0
  alpha_6: 1.0
  energy_cost_per_kwh: 1.0
  eta_l_term: 1.0
  eta_u_term: 1.0
rl:
  episodes: 5000
  evaluation_episodes: 100
  random_seeds: 5
  gamma: 0.997
  learning_rate: 5.0e-5
  optimizer: Adam
  batch_size: 128
  replay_buffer_size: 500000
  warmup_steps: 200
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_fraction: 0.8
  epsilon_decay_steps: 4000
  target_update_type: polyak
  target_update_interval: 1
  polyak_tau: 0.005
  hidden_layers: [256, 256, 128]
  activation: ReLU
  max_steps_per_episode: 100
  gradient_clip_norm: 10.0
  seed: 1
  deterministic: false
  device: auto
