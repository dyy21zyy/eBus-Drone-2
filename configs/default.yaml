project: ebus_drone_rl
instance: small
method: proposed
seed: 1
paths:
  data_generated: data/generated
  outputs: outputs
offline:
  allow_greedy_fallback: false
generation:
  horizon_minutes: 360
  num_scenarios: 1
network:
  num_stops: 30
  stop_spacing_km: 1.0
  service_area:
    x_min_km: 0.0
    x_max_km: 29.0
    y_min_km: -3.0
    y_max_km: 3.0
bus:
  passenger_capacity: 80
  battery_capacity_kwh: 160.0
  safety_battery_kwh: 40.0
  energy_kwh_per_km: 1.6
  nominal_speed_kmh: 30.0
  freight_capacity_kg: 20.0
charging:
  chargers_per_station: 3
  pantograph_power_kw: 500.0
  efficiency: 0.95
  action_set_seconds: [0, 15, 30, 45, 60, 75, 90, 105, 120]
  max_single_stop_seconds: 120
passenger:
  baseline_rate_mean_per_min: 0.25
  baseline_rate_std_per_min: 0.10
  baseline_rate_min_per_min: 0.05
  baseline_rate_max_per_min: 0.60
  demand_intensity_factor: 1.0
  demand_intensity_sensitivity: [0.75, 1.0, 1.25, 1.5]
  boarding_time_sec_per_passenger: 3.0
  alighting_time_sec_per_passenger: 1.5
  alighting_probability_min: 0.05
  alighting_probability_max: 0.25
parcel:
  weight_values_kg: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5]
  drone_round_trip_range_km: 8.0
  unloading_capacity_kg_per_stop: 10.0
  unloading_time_sec_per_kg: 6.0
  locker_capacity_kg: 50.0
  nominal_locker_waiting_time_min: 10.0
  cost:
    bus_transport_per_kgkm: 1.0
    drone_per_km: 2.0
    locker_holding_per_kgmin: 0.1
    lateness_per_min: 10.0
drone:
  drones_per_station: 3
  speed_kmh: 40.0
  max_round_trip_duration_min: 120.0
  customer_service_time_min: 1.0
  turnaround_time_min: 1.0
battery:
  initial_fully_charged_per_station: 6
  initial_depleted_per_station: 0
  charge_power_kw: 2.0
  max_simultaneous_charging: 3
power:
  station_capacity_kw: 1800.0
  nominal_base_load_min_kw: 50.0
  nominal_base_load_max_kw: 150.0
  disturbance_std_kw: 8.0
reward:
  alpha_1: 0.01
  alpha_2: 1.0
  alpha_3: 1.0
  alpha_4: 1.0
  alpha_5: 1.0
  alpha_6: 1.0
  energy_cost_per_kwh: 1.0
  eta_l_term: 1.0
  eta_u_term: 1.0
rl:
  episodes: 20
  max_steps_per_episode: 100
  gamma: 0.99
  learning_rate: 0.001
  batch_size: 32
  replay_buffer_size: 5000
  warmup_steps: 20
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 500
  target_update_type: hard
  target_update_interval: 25
  polyak_tau: 0.005
  hidden_layers: [128, 128]
  gradient_clip_norm: 10.0
  seed: 1
  deterministic: false
  device: auto
